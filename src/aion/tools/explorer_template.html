<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{REPO_NAME} Architecture Explorer</title>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f7f4;
      --bg-tertiary: #f1efe8;
      --text-primary: #2c2c2a;
      --text-secondary: #5f5e5a;
      --text-tertiary: #888780;
      --border-light: rgba(0,0,0,0.08);
      --border-medium: rgba(0,0,0,0.15);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-mono: "SF Mono", "Fira Code", "Consolas", monospace;
      --color-core: #534AB7;
      --color-core-bg: #EEEDFE;
      --color-agent: #0F6E56;
      --color-agent-bg: #E1F5EE;
      --color-data: #D85A30;
      --color-data-bg: #FAECE7;
      --color-support: #888780;
      --color-support-bg: #F1EFE8;
      --color-infra: #3B8BD4;
      --color-infra-bg: #E6F1FB;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1a1a18;
        --bg-secondary: #242422;
        --bg-tertiary: #2c2c2a;
        --text-primary: #e8e6dd;
        --text-secondary: #b4b2a9;
        --text-tertiary: #888780;
        --border-light: rgba(255,255,255,0.08);
        --border-medium: rgba(255,255,255,0.15);
        --color-core: #AFA9EC;
        --color-core-bg: #3C3489;
        --color-agent: #5DCAA5;
        --color-agent-bg: #085041;
        --color-data: #F0997B;
        --color-data-bg: #712B13;
        --color-support: #B4B2A9;
        --color-support-bg: #444441;
        --color-infra: #85B7EB;
        --color-infra-bg: #0C447C;
      }
    }
    * { margin: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--bg-primary);
      padding: 20px;
      max-width: 960px;
      margin: 0 auto;
    }
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      min-width: 80px;
    }
    .stat-val { font-size: 20px; font-weight: 500; }
    .stat-val-text { font-size: 14px; font-weight: 500; }
    .stat-label {
      font-size: 11px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 16px;
    }
    .export-btn {
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-medium);
      background: none;
      transition: background 0.15s;
      font-family: inherit;
    }
    .export-btn:hover { background: var(--bg-secondary); }
    .tier-label {
      font-size: 11px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 16px 0 6px;
    }
    .mod-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .mod-card {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 8px 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      min-width: 90px;
      border-left-width: 2px;
      border-left-style: solid;
    }
    .mod-card:hover { border-color: var(--border-medium); }
    .mod-card.active { border-color: var(--border-medium); }
    .mod-name { font-weight: 500; font-size: 13px; }
    .mod-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
    .detail-panel {
      margin-top: 16px;
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      min-height: 100px;
    }
    .dp-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .dp-title { font-weight: 500; font-size: 16px; }
    .dp-path {
      font-size: 12px;
      color: var(--text-tertiary);
      font-family: var(--font-mono);
    }
    .dp-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }
    .dp-section { margin-bottom: 12px; }
    .dp-section-title {
      font-size: 11px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .dp-edges { display: flex; flex-wrap: wrap; gap: 4px; }
    .edge-pill {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-light);
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .edge-pill:hover { border-color: var(--border-medium); }
    .edge-pill.in { border-left: 2px solid var(--color-agent); }
    .edge-pill.out { border-left: 2px solid var(--color-data); }
    .class-list { list-style: none; padding: 0; margin: 0; }
    .class-item {
      font-size: 12px;
      padding: 6px 0;
      border-bottom: 0.5px solid var(--border-light);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .class-item:last-child { border: none; }
    .class-item:hover { color: var(--color-core); }
    .cl-name { font-family: var(--font-mono); font-weight: 500; }
    .cl-bases {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-left: 6px;
      font-style: italic;
    }
    .cl-methods-count {
      color: var(--text-tertiary);
      font-size: 11px;
      white-space: nowrap;
    }
    .method-drawer {
      padding: 4px 0 4px 16px;
      font-size: 11px;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      display: none;
      line-height: 1.8;
    }
    .method-drawer.open { display: block; }
    .empty-state {
      font-size: 13px;
      color: var(--text-tertiary);
      padding: 24px 0;
      text-align: center;
    }
    @media (max-width: 768px) {
      .stats-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div id="stats-row" class="stats-row"></div>
  <div class="toolbar">
    <button class="export-btn" onclick="exportJSON()">Export JSON</button>
  </div>
  <div id="explorer-tiers"></div>
  <div id="detail" class="detail-panel">
    <div class="empty-state">Select a module to view details</div>
  </div>
  <script>
    const DATA = {DATA_JSON};
    const TIERS = {TIERS_JSON};

    const TIER_COLORS = {
      core:    { color: 'var(--color-core)',    bg: 'var(--color-core-bg)' },
      agent:   { color: 'var(--color-agent)',   bg: 'var(--color-agent-bg)' },
      data:    { color: 'var(--color-data)',    bg: 'var(--color-data-bg)' },
      support: { color: 'var(--color-support)', bg: 'var(--color-support-bg)' },
      infra:   { color: 'var(--color-infra)',   bg: 'var(--color-infra-bg)' }
    };

    const moduleMap = {};
    DATA.components.forEach(function(c) { moduleMap[c.name] = c; });

    const tierOfModule = {};
    TIERS.forEach(function(t) {
      t.ids.forEach(function(id) { tierOfModule[id] = t.color; });
    });

    // Stats row
    (function renderStats() {
      var s = DATA.summary || {};
      var d = DATA.deployment || {};
      var row = document.getElementById('stats-row');
      var stats = [
        { val: (DATA.components || []).length, label: 'Modules', numeric: true },
        { val: (DATA.edges || []).length, label: 'Edges', numeric: true },
        { val: s.total_files_analyzed || 0, label: 'Files', numeric: true },
      ];
      var totalClasses = 0;
      (DATA.components || []).forEach(function(c) {
        totalClasses += (c.key_classes || []).length;
      });
      stats.push({ val: totalClasses, label: 'Classes', numeric: true });
      if (s.tech_stack && s.tech_stack.length) {
        stats.push({ val: s.tech_stack.join(', '), label: 'Tech Stack', numeric: false });
      }
      if (d.orchestration) {
        stats.push({ val: d.orchestration, label: 'Orchestration', numeric: false });
      }
      stats.forEach(function(st) {
        var card = document.createElement('div');
        card.className = 'stat-card';
        card.innerHTML = '<div class="' + (st.numeric ? 'stat-val' : 'stat-val-text') + '">'
          + escHtml(String(st.val)) + '</div><div class="stat-label">'
          + escHtml(st.label) + '</div>';
        row.appendChild(card);
      });
    })();

    function renderExplorer() {
      var container = document.getElementById('explorer-tiers');
      container.innerHTML = '';
      TIERS.forEach(function(tier) {
        var lbl = document.createElement('div');
        lbl.className = 'tier-label';
        lbl.textContent = tier.label;
        container.appendChild(lbl);

        var grid = document.createElement('div');
        grid.className = 'mod-grid';
        tier.ids.forEach(function(id) {
          var m = moduleMap[id];
          if (!m) return;
          var card = document.createElement('div');
          card.className = 'mod-card';
          card.dataset.id = id;
          card.style.borderLeftColor = TIER_COLORS[tier.color].color;
          var cls = (m.key_classes || []).length;
          card.innerHTML = '<div class="mod-name">' + escHtml(id)
            + '</div><div class="mod-sub">' + cls + ' classes</div>';
          card.onclick = function() { selectModule(id); };
          grid.appendChild(card);
        });
        container.appendChild(grid);
      });
    }

    var activeModule = null;

    function selectModule(id) {
      activeModule = id;

      document.querySelectorAll('.mod-card').forEach(function(c) {
        var isActive = c.dataset.id === id;
        c.classList.toggle('active', isActive);
        if (isActive) {
          var tc = tierOfModule[id];
          c.style.background = TIER_COLORS[tc] ? TIER_COLORS[tc].bg : '';
        } else {
          c.style.background = '';
        }
      });

      var m = moduleMap[id];
      if (!m) return;
      var detail = document.getElementById('detail');
      var inEdges = (DATA.edges || []).filter(function(e) { return e.to === id; });
      var outEdges = (DATA.edges || []).filter(function(e) { return e.from === id; });
      var tc = tierOfModule[id] || 'core';

      var html = '';

      html += '<div class="dp-header">';
      html += '<span class="dp-title">' + escHtml(id) + '</span>';
      html += '<span class="dp-path">' + escHtml(m.path || '') + '</span>';
      if (m.language) {
        html += '<span class="dp-badge" style="background:' + TIER_COLORS[tc].bg
          + ';color:' + TIER_COLORS[tc].color + '">' + escHtml(m.language) + '</span>';
      }
      if (m.role) {
        html += '<span class="dp-badge" style="background:var(--bg-tertiary)'
          + ';color:var(--text-secondary)">' + escHtml(m.role) + '</span>';
      }
      html += '</div>';

      if (inEdges.length || outEdges.length) {
        html += '<div class="dp-section">';
        html += '<div class="dp-section-title">Dependencies ('
          + (inEdges.length + outEdges.length) + ')</div>';
        html += '<div class="dp-edges">';
        inEdges.forEach(function(e) {
          html += '<span class="edge-pill in" onclick="selectModule(\''
            + escHtml(e.from) + '\')" title="' + escHtml(e.evidence || '')
            + '">' + escHtml(e.from) + ' &rarr; ' + escHtml(id) + '</span>';
        });
        outEdges.forEach(function(e) {
          html += '<span class="edge-pill out" onclick="selectModule(\''
            + escHtml(e.to) + '\')" title="' + escHtml(e.evidence || '')
            + '">' + escHtml(id) + ' &rarr; ' + escHtml(e.to) + '</span>';
        });
        html += '</div></div>';
      }

      var classes = m.key_classes || [];
      if (classes.length) {
        html += '<div class="dp-section">';
        html += '<div class="dp-section-title">Key classes (' + classes.length + ')</div>';
        html += '<ul class="class-list">';
        classes.forEach(function(c, i) {
          var base = c.bases && c.bases.length
            ? '<span class="cl-bases">(' + escHtml(c.bases.join(', ')) + ')</span>'
            : '';
          var mc = (c.methods || []).length;
          html += '<li class="class-item" onclick="toggleMethods(\''
            + id + '-' + i + '\')">';
          html += '<span><span class="cl-name">' + escHtml(c.name)
            + '</span>' + base + '</span>';
          html += '<span class="cl-methods-count">' + mc + ' methods</span>';
          html += '</li>';
          if (mc) {
            html += '<div class="method-drawer" id="md-' + id + '-' + i + '">';
            c.methods.forEach(function(mth) {
              html += '<div>' + escHtml(mth) + '()</div>';
            });
            html += '</div>';
          }
        });
        html += '</ul></div>';
      } else {
        html += '<div class="dp-section">';
        html += '<div class="dp-section-title">Key classes</div>';
        html += '<div style="font-size:12px;color:var(--text-tertiary)">'
          + 'No classes extracted for this module.</div></div>';
      }

      var allCollabs = {};
      classes.forEach(function(c) {
        (c.collaborators || []).forEach(function(col) { allCollabs[col] = true; });
      });
      var collabList = Object.keys(allCollabs).sort();
      if (collabList.length > 0) {
        html += '<div class="dp-section">';
        html += '<div class="dp-section-title">Collaborators ('
          + collabList.length + ')</div>';
        html += '<div style="font-size:11px;color:var(--text-secondary)'
          + ';font-family:var(--font-mono);line-height:1.8">'
          + collabList.map(escHtml).join(', ') + '</div></div>';
      }

      detail.innerHTML = html;
    }

    function toggleMethods(key) {
      var el = document.getElementById('md-' + key);
      if (el) el.classList.toggle('open');
    }

    function escHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function exportJSON() {
      var blob = new Blob(
        [JSON.stringify(DATA, null, 2)],
        { type: 'application/json' }
      );
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = ((DATA.meta || {}).repo_name || 'architecture') + '-data.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    renderExplorer();
  </script>
</body>
</html>
