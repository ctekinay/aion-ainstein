# AInstein runtime configuration — system infrastructure.
#
# This file holds values that are NOT per-plugin: kb_collections (Weaviate
# bindings), agent tool-call ceilings, LLM token budgets, document-agent
# timeouts, persona classification config, quality gate, upload limits.
#
# Plugin-content tuning (retrieval limits, truncation, abstention threshold)
# lives in each plugin's .ainstein-plugin/thresholds.yaml.
#
# Access from code:
#   from aion.config.runtime import get_runtime_value
#   limits = get_runtime_value("llm_token_limits", {})
#   max_calls = get_runtime_value("agents.max_tool_calls.rag_agent", 15)

llm_token_limits:
  # --- Persona intent classification ---
  # Reasoning model needs 2048 because GPT-5 spends reasoning tokens
  # WITHIN max_completion_tokens. At 500, reasoning consumes everything
  # and visible output is empty. 2048 gives room for reasoning + the
  # ~100-token JSON classification response.
  persona_reasoning: 2048
  persona_standard: 500
  # --- Brief summaries (turn summaries, title generation) ---
  summarize_reasoning: 512
  summarize_standard: 150
  # --- RAG agent summarization ---
  rag_reasoning: 1000
  rag_standard: 1000
  # --- RAG with uploaded document in context (review, summarize) ---
  rag_document_reasoning: 8192
  rag_document_standard: 4096
  # --- Document analysis agent (dedicated, tool-less) ---
  document_analysis_reasoning: 16384
  document_analysis_standard: 8192
  # --- Cross-reference synthesis (document vs KB compliance analysis) ---
  cross_reference_synthesis: 16384
  # --- Chat model review (stream_inspect_response) ---
  chat_review_reasoning: 4096
  chat_review_standard: 2000
  # --- Direct LLM calls (generate_with_openai) ---
  direct_reasoning: 1000
  direct_standard: 1000

upload:
  max_file_bytes: 20971520     # 20 MB
  max_text_chars: 1000000      # 1M chars
  upload_doc_max_chars: 500000 # 500K chars
  history_max_turn_pairs: 4    # Truncate follow-up conversation history

element_registry:
  prompt_limit: 30

document_agent:
  # Separate from timeout_agent_multi_tool (180s) which is designed for
  # multi-tool agents. Document agent has zero tools — one LLM call.
  timeout_ollama: 300      # 5 min — large docs on local 20B model
  timeout_cloud: 60        # 1 min — cloud models are fast
  # Retrying a timeout on Ollama is pointless — the model won't get faster.
  # Cloud models may recover from transient issues.
  max_retries_ollama: 0    # No retry = 1 attempt
  max_retries_cloud: 1     # 1 retry = 2 attempts
  # Token streaming batch size (chars). Tokens are accumulated until
  # this threshold, then emitted as one SSE 'text' event.
  stream_batch_chars: 200

persona:
  # Models too slow for LLM classification (>120s on 62K prompt).
  # These skip Persona and go straight to RAG with raw query.
  skip_classification_models:
    - "qwen3.5:35b-a3b"
  # Conversation-history sizing for intent classification. System-infra
  # (read via get_runtime_value("persona")), NOT plugin-content tuning —
  # persona context sizing is host behaviour, not a per-plugin threshold.
  # Made explicit here (previously only code defaults; an orphan duplicate
  # under persona-orchestrator/references/thresholds.yaml was removed).
  verbatim_window: 20
  message_truncation_chars: 8000

agents:
  max_tool_calls:
    # Keys match AGENT_LABELS in agents/__init__.py
    default: 15
    rag_agent: 15
    principle_agent: 15
    repo_analysis_agent: 12
  # Compliance evaluation batching — splits principles into groups and
  # evaluates each batch separately, then merges results programmatically.
  # Enabled for all providers: batched path guarantees complete principle coverage.
  # The non-batched path relies on the LLM calling list_principles on its own,
  # which GPT-5.2 failed to do (called request_data instead).
  compliance_batch_enabled: true
  compliance_batch_size: 10
  compliance_batch_force_providers:
    - "ollama"
  compliance_batch_optional_providers:
    - "openai"
    - "github_models"

quality_gate:
  enabled: true
  # Intentionally tiny — expects single-word verdict ("PASS" or "FAIL").
  # Do NOT increase: larger values waste tokens and may produce multi-word
  # responses that break the .startswith("FAIL") check.
  evaluation_max_tokens: 10
  condensation_max_tokens: 1024
  proportionality:
    enabled: true
    # Skip LLM evaluation if response is already under this word count
    token_ceiling: 300
    # Optional model override for gate LLM calls (null = use RAG model)
    model_override: null
    evaluation_prompt: >
      You are evaluating whether a RAG response is proportionate to the query.
      A "simple" query (single fact lookup, "what is X?") should get a 3-6 sentence
      summary with citations, not an exhaustive enumeration of all document sections.
      Does this response match that expectation?
      Respond with exactly: PASS (proportionate) or FAIL (needs condensation).
    condensation_prompt: >
      Condense this response to a focused summary (3-6 sentences).
      Preserve ALL document citations (ADR.XX, PCP.XX, policy titles).
      Preserve markdown formatting: use headings, bullet lists, and
      paragraph breaks exactly as the original. Do not flatten into
      a single paragraph.
      End with a single offer to elaborate.
      Do not add disclaimers about the condensation.
  abstention_cleanup:
    enabled: true
    item_threshold: 2
    # Known limitation: this list won't catch all paraphrases.
    # Expand from real production logs as new patterns emerge.
    negation_signals:
      - "no budget"
      - "no relevant"
      - "not found"
      - "not in the knowledge base"
      - "contains no"
      - "does not contain"
      - "does not specify"
      - "doesn't contain"
      - "doesn't specify"
      - "no explicit"
      - "no information"

# Single source of truth for KB collection names.
# Update here when a new collection is added to Weaviate.
kb_collections:
  - name: ArchitecturalDecision
    display: "architecture decisions"
  - name: Principle
    display: "principles"
  - name: PolicyDocument
    display: "policies"
