services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.35.7
    container_name: weaviate-ainstein-dev
    restart: unless-stopped
    ports:
      - ${WEAVIATE_PORT:-8090}:8080
      - ${WEAVIATE_GRPC_PORT:-50061}:50051
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      # Using Ollama for embeddings and generation (local LLM)
      DEFAULT_VECTORIZER_MODULE: 'text2vec-ollama'
      ENABLE_API_BASED_MODULES: 'true'
      # All collections use client-side embeddings (Vectorizer.none()) —
      # only Ollama modules needed for Weaviate's built-in generative queries.
      ENABLE_MODULES: 'text2vec-ollama,generative-ollama'
      # Ollama runs on host - use host.docker.internal for Windows/Mac
      # For Linux, use the actual host IP or --add-host=host.docker.internal:host-gateway
      OLLAMA_API_ENDPOINT: 'http://host.docker.internal:11434'
      CLUSTER_HOSTNAME: 'node1'
      CLUSTER_ADVERTISE_ADDR: '127.0.0.1'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/v1/.well-known/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  weaviate_data:
